<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/webp" href="/assets/pumpbros-logo.webp">
  <title>PUMPBROS - Connect Wallet</title>
  <link rel="stylesheet" href="/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Anybody:wght@700;800&family=Press+Start+2P&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
</head>
<body class="min-h-screen w-full m-0 p-0 font-body-md text-white flex items-center justify-center bg-cover bg-center" style="background-image: url('/assets/aut-background.webp');">
  
  <main class="w-full max-w-4xl p-4">
    <!-- Main Card -->
    <div class="bg-[#fcf5e3] border-8 border-[#543b23] shadow-[8px_8px_0px_0px_#1a1a1a] flex flex-col md:flex-row w-full rounded-sm overflow-hidden">
      
      <!-- Left side (Logo / Banner) -->
      <div class="flex-1 bg-gradient-to-b from-sky-200 to-green-300 p-8 flex flex-col items-center justify-between border-b-8 md:border-b-0 md:border-r-4 border-[#543b23] relative">
        <div class="z-10 text-center">
          <h1 class="text-4xl md:text-5xl font-pixel text-yellow-400 pixel-text-shadow mb-4">PUMP<br>BROS</h1>
          <div class="bg-[#fcf5e3] border-4 border-[#543b23] px-4 py-2 mt-4 inline-block shadow-[4px_4px_0_0_rgba(0,0,0,0.2)]">
            <p class="text-[#543b23] font-bold text-sm tracking-widest font-pixel leading-relaxed">
              FIGHT &middot; WIN &middot; EARN
            </p>
          </div>
        </div>
        
        <!-- Scene / Logo image -->
        <div class="mt-8 flex justify-center w-full">
           <img src="/assets/HomePage.webp" alt="Pumpbros" class="w-full h-auto object-contain drop-shadow-lg pixel-image" style="image-rendering: pixelated; max-width: 250px;">
        </div>
      </div>

      <!-- Right side (Form) -->
      <div class="flex-1 p-8 md:p-12 flex flex-col justify-center border-l-4 border-[#543b23] bg-[#fcf5e3]">
        <h2 class="text-2xl md:text-3xl font-pixel text-[#3c5423] mb-8 leading-tight">
          Enter<br>the arena
        </h2>
        
        <div class="flex flex-col gap-6">
          <div class="flex flex-col gap-2">
            <label for="username" class="text-[#543b23] font-bold text-sm font-pixel tracking-wide">Fighter name</label>
            <input type="text" id="username" placeholder="e.g. PumpSlayer99" class="w-full bg-white border-4 border-[#d4bca0] p-3 text-black font-bold font-body-lg focus:outline-none focus:border-yellow-400 focus:shadow-[inset_0_0_0_2px_rgba(251,191,36,0.5)] transition-all">
          </div>
          
          <!-- Connect Wallet Button -->
          <button id="btn-connect" class="w-full bg-[#5d3fd3] hover:bg-[#7252f5] text-white font-bold font-body-lg p-4 border-b-4 border-[#32237a] active:border-b-0 active:translate-y-1 transition-all flex items-center justify-center gap-3">
            Connect Wallet
          </button>
          
          <!-- Start Game Button (Initially Disabled or hidden until connected) -->
          <button id="btn-start" class="w-full bg-[#fbbf24] hover:bg-[#fcd34d] text-[#543b23] font-bold font-pixel text-sm p-4 border-b-4 border-[#b45309] active:border-b-0 active:translate-y-1 transition-all disabled:opacity-50 disabled:cursor-not-allowed mt-2">
            Start My Game
          </button>

          <!-- Status / Error message area -->
          <div id="auth-status" class="hidden mt-4 p-3 border-2 rounded text-sm font-bold text-center"></div>
        </div>
      </div>

    </div>
  </main>

  <script type="module" src="/src/auth.js"></script>
</body>
</html>
